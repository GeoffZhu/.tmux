##### 基础 #####

# prefix 改为 Ctrl+x
set -g prefix C-x
unbind C-a
bind C-x send-prefix

# 鼠标支持
set -g mouse on

# 保留鼠标滚动/选择能力；单击空白处只清除选择，不退出 copy-mode
unbind -T copy-mode-vi MouseDown1Pane
bind -T copy-mode-vi MouseDown1Pane send-keys -X clear-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
unbind -T copy-mode MouseDown1Pane
bind -T copy-mode MouseDown1Pane send-keys -X clear-selection
unbind -T copy-mode MouseDragEnd1Pane
bind -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection

# 支持现代组合键
set -g extended-keys on
set -g extended-keys-format csi-u

# copy mode 使用默认键位（emacs）
setw -g mode-keys emacs

# 提高历史 scrollback
set -g history-limit 100000

##### 分屏 #####

# 垂直分屏
bind | split-window -h

# 水平分屏
bind - split-window -v

##### pane 切换（默认箭头） #####

# 使用 tmux 默认方向键进行 pane 切换：Prefix + ←/↓/↑/→
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

##### pane resize #####

# 使用 Prefix + Ctrl + 方向键调整 pane 大小
bind -r C-Left resize-pane -L 5
bind -r C-Down resize-pane -D 5
bind -r C-Up resize-pane -U 5
bind -r C-Right resize-pane -R 5

##### window #####

# 新 window
bind c new-window

# window 切换
bind n next-window
bind p previous-window

##### session #####

# session 选择器
bind S choose-session

##### reload config #####

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

##### 状态栏 #####

set -g status-position bottom
set -g status 2
set -g status-bg default
set -g status-fg white
set -g status-style bg=default,fg=white
set -g status-left-style bg=default,fg=white
set -g status-right-style bg=default,fg=white
set -g status-interval 1
set -g status-left-length 200
set -g status-right-length 0
set -g status-right ""
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""
set -g status-format[0] ""
set -g status-format[1] "#[align=left]#{T;=/#{status-left-length}:status-left}"

set -g status-left "#{?client_prefix,#[bg=yellow]#[fg=black]#[bold] C-x #[default] #[fg=white]|: ↔️   -: ↕️   x: ✖️,#{?@shared,#[fg=green] shared #[fg=cyan],#[fg=cyan]  }#{pane_current_path}}"

##### Mac clipboard #####

bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel "pbcopy"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
